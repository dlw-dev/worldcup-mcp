name: refresh-data

# "Git automático": busca os dados (openfootball + placar ao vivo) e, se houver
# diff, commita data/. O Worker LÊ o data/tournament.json commitado direto do
# raw GitHub a cada request (cache 5min), então o commit JÁ atualiza o que está
# no ar, SEM redeploy. O deploy do Worker só é necessário quando o CÓDIGO muda
# (push em src/), e usa CLOUDFLARE_API_TOKEN (opcional; sem ele, só o commit
# roda e os dados ainda atualizam pelo raw).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["src/**", "wrangler.toml", "package.json"]

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh data (openfootball + live score overlay)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/refresh-data.mjs

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "worldcup-bot"
          git config user.email "bot@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sem mudanças nos dados."
          else
            git add data/
            git commit -m "chore(data): refresh fixtures/scores [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Deploy do Worker SÓ quando o código muda (push em src/). Dados não
      # precisam de deploy (o Worker lê o raw do git). continue-on-error pra não
      # falhar a run quando CLOUDFLARE_API_TOKEN ainda não estiver configurado.
      - name: Install deps
        if: github.event_name == 'push'
        run: npm install

      - name: Deploy Worker
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
